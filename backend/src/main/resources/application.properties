spring.application.name=restaurant
spring.application.name=restaurant
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/girasol}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:girasol}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:girasol}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false

server.port=${SERVER_PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.jwt.secret=${APP_JWT_SECRET:dev-local-secret-change-this-before-production-32}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.upload-dir=${APP_UPLOAD_DIR:uploads/dishes}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

translation.enabled=${TRANSLATION_ENABLED:true}
translation.provider=${TRANSLATION_PROVIDER:none}
translation.api-key=${TRANSLATION_API_KEY:}
translation.libretranslate.url=${TRANSLATION_LIBRETRANSLATE_URL:https://libretranslate.com}

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
